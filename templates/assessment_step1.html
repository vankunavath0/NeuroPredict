<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Assessment - NeuroPredict</title>
    <style>
        :root {
            --bg: #f5f7fb;
            --surface: #ffffff;
            --line: #e5e7eb;
            --text: #111827;
            --muted: #6b7280;
            --primary: #2563eb;
            --danger: #dc2626;
            --shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
        }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: Arial, sans-serif; color: var(--text); background: var(--bg); }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 22px;
            padding: 14px 32px;
            background: #fff;
            border-bottom: 1px solid var(--line);
        }
        .nav-left { display: flex; align-items: center; gap: 10px; }
        .nav-logo { width: 36px; height: 36px; object-fit: contain; }
        .nav-title { font-size: 22px; font-weight: 900; }
        .nav-menu { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
        .nav-menu a {
            color: #4b5563;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            padding: 8px 0;
            border-bottom: 2px solid transparent;
            transition: color 0.2s ease, border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
        }
        .nav-menu a.active,
        .nav-menu a:hover { color: var(--primary); border-bottom-color: var(--primary); }
        .nav-menu a.logout { color: var(--danger); padding: 8px 12px; border-radius: 8px; }
        .nav-menu a.logout:hover { color: #fff; border-bottom-color: transparent; background: var(--danger); box-shadow: 0 10px 24px rgba(220, 38, 38, 0.25); }

        .container { width: min(1100px, calc(100% - 40px)); margin: 0 auto; padding: 34px 0 48px; }
        .title { margin: 0; font-size: clamp(28px, 4vw, 36px); line-height: 1.1; }
        .page-number { margin: 8px 0 24px; color: var(--muted); }
        .progress { width: 100%; height: 8px; background: #e5e7eb; border-radius: 999px; margin-bottom: 24px; overflow: hidden; }
        .progress-fill { width: 25%; height: 100%; background: var(--primary); border-radius: inherit; }
        .section-box {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 26px;
            box-shadow: var(--shadow);
        }
        .section-header { margin: 0; font-size: 22px; }
        .section-sub { margin: 8px 0 24px; color: var(--muted); }
        .form-row { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 20px; margin-bottom: 20px; }
        .form-group { min-width: 0; }
        label { display: block; margin-bottom: 7px; color: #374151; font-size: 14px; font-weight: 800; }
        input, select {
            width: 100%;
            min-height: 44px;
            padding: 11px 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background: #fff;
            font-size: 15px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        input:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12); }
        input[type="range"] { padding: 0; accent-color: var(--primary); }
        .slider-row { margin-bottom: 24px; }
        .slider-label { display: flex; justify-content: space-between; gap: 12px; }
        .slider-value { color: var(--primary); font-weight: 900; }
        .btn-row { display: flex; justify-content: flex-end; margin-top: 24px; }
        .nav-btn {
            min-width: 130px;
            min-height: 46px;
            border: 0;
            border-radius: 8px;
            color: #fff;
            background: var(--primary);
            font-size: 15px;
            font-weight: 900;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }
        .nav-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 24px rgba(37, 99, 235, 0.22); background: #1d4ed8; }
        @media (max-width: 760px) {
            .navbar { align-items: flex-start; flex-direction: column; padding: 14px 20px; }
            .container { width: min(100% - 28px, 1100px); padding-top: 24px; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="navbar">
    <div class="nav-left">
        <img src="{{ url_for('static', filename='logo.png') }}" class="nav-logo" alt="NeuroPredict">
        <span class="nav-title">NeuroPredict</span>
    </div>
    <div class="nav-menu">
        <a href="{{ url_for('patient_dashboard') }}">Dashboard</a>
        <a href="{{ url_for('assessment') }}" class="active">Start Assessment</a>
        <a href="{{ url_for('patient_timeline') }}">Health Timeline</a>
        <a href="{{ url_for('patient_ehr') }}">My EHR</a>
        <a href="{{ url_for('patient_profile') }}">My Profile</a>
        <a href="{{ url_for('logout') }}" class="logout">Logout</a>
    </div>
</div>

<main class="container">
    <h1 class="title">Neurological Risk Assessment</h1>
    <div class="page-number">Page 1 of 4</div>
    <div class="progress"><div class="progress-fill"></div></div>

    <form method="POST">
        <section class="section-box">
            <h2 class="section-header">Demographics Information</h2>
            <p class="section-sub">Basic information used by the assessment model.</p>

            <div class="slider-row">
                <label class="slider-label" for="age">
                    <span>Age</span>
                    <span class="slider-value" id="ageValue">{{ form_data.get('age', 65) }} years</span>
                </label>
                <input id="age" name="age" type="range" min="18" max="100" value="{{ form_data.get('age', 65) }}" oninput="ageValue.innerText=this.value + ' years'">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="gender">Gender</label>
                    <select id="gender" name="gender" required>
                        <option value="">Select gender</option>
                        <option value="Male" {{ "selected" if form_data.get('gender') == "Male" else "" }}>Male</option>
                        <option value="Female" {{ "selected" if form_data.get('gender') == "Female" else "" }}>Female</option>
                        <option value="Other" {{ "selected" if form_data.get('gender') == "Other" else "" }}>Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="weight">Weight (kg)</label>
                    <input id="weight" type="number" name="weight" value="{{ form_data.get('weight', 70) }}" min="1">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="height">Height (cm)</label>
                    <input id="height" type="number" name="height" value="{{ form_data.get('height', 170) }}" min="1">
                </div>
                <div class="form-group">
                    <label for="education">Education Level</label>
                    <select id="education" name="education">
                        <option value="">Select education</option>
                        {% for item in ["High School", "Bachelors Degree", "Masters Degree", "Doctorate"] %}
                            <option value="{{ item }}" {{ "selected" if form_data.get('education') == item else "" }}>{{ item }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="occupation">Occupation</label>
                    <input id="occupation" type="text" name="occupation" value="{{ form_data.get('occupation', '') }}" placeholder="e.g. Engineer, Teacher">
                </div>
                <div class="form-group">
                    <label for="languagePreference">Language Preference</label>
                    <select id="languagePreference" name="languagePreference">
                        <option value="">Select language</option>
                        {% for item in ["Kannada", "English", "Hindi"] %}
                            <option value="{{ item }}" {{ "selected" if form_data.get('languagePreference') == item else "" }}>{{ item }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
        </section>

        <div class="btn-row">
            <button type="submit" name="direction" value="next" class="nav-btn">Next</button>
        </div>
    </form>
</main>
</body>
</html>
