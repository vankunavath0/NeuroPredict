

<!DOCTYPE html>
<html lang="en">
<head>
    <title>Doctor Signup - NeuroPredict</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
<div class="page-container">

    <!-- Logo + Title -->
    <div class="header-section">
        <img src="{{ url_for('static', filename='logo.png') }}" class="logo" alt="Logo">
        <h1 class="title">NeuroPredict</h1>
        <p class="subtitle">Advanced Neurodegenerative Disease Risk Assessment</p>
    </div>

    <!-- Login Card -->
    <div class="login-card">

        <h2 class="login-title">Create Doctor Account</h2>
        <p class="login-desc">Set up access for patient management and care planning.</p>

        <form method="POST" action="doctor_register">
            <input type="text" name="name" placeholder="Enter your name" required>
            <input type="email" name="email" placeholder="your.email@example.com" required>
            <input type="password" name="password" placeholder="Enter your password" required>
            <button type="submit" class="btn-primary">Sign Up</button>
        </form>

        <p class="create-account">
            Already have an account?
            <a href="doctor_login">Sign In</a>
        </p>
    </div>

</div>
</body>
</html>
